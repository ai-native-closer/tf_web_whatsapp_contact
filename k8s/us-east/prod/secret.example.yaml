apiVersion: v1
kind: Secret
metadata:
  name: tf-web-whatsapp-contact-secrets
type: Opaque
stringData:
  APP_SESSION_SECRET: replace-with-a-long-random-secret
  APP_DB_HOST: replace-with-rds-private-endpoint
  APP_DB_PORT: "3306"
  APP_DB_USER: replace-with-rds-user
  APP_DB_PASSWORD: replace-with-rds-password
  APP_DB_NAME: whatsapp_contact
  APP_DB_CONNECTION_LIMIT: "10"
  APP_ADMIN_USERNAME: admin
  APP_ADMIN_PASSWORD: replace-with-initial-admin-password
  APP_WHATSAPP_AUTH_DATA_PATH: /app/storage/baileys_auth
  APP_WHATSAPP_SYNC_FULL_HISTORY: "true"
  APP_WHATSAPP_LOG_LEVEL: warn
  APP_WHATSAPP_RECONNECT_BASE_DELAY_MS: "1000"
  APP_WHATSAPP_RECONNECT_MAX_DELAY_MS: "30000"
  APP_WHATSAPP_HISTORY_REQUEST_TIMEOUT_MS: "15000"
  APP_WHATSAPP_MOCK: "false"
  APP_SENDING_DEFAULT_INTERVAL_MS: "5000"
  APP_SENDING_MIN_INTERVAL_MS: "2000"
  APP_SENDING_DAILY_LIMIT: "80"
  APP_SENDING_RETRY_LIMIT: "1"
  APP_HISTORY_WINDOW_DAYS: "30"
  APP_HISTORY_INITIAL_SYNC_LIMIT: "100"
  APP_HISTORY_OLDER_SYNC_LIMIT: "50"
  APP_LEAD_SCORING_ENABLED: "false"
